name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ## ── Governance — review infrastructure health ────────────────────
  governance:
    name: Governance Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Verify review infrastructure exists (PR_EVIDENCE.md references)
      - name: Review governance check
        run: |
          set -euo pipefail
          FAIL=0
          for f in .github/PULL_REQUEST_TEMPLATE.md .github/CODEOWNERS .github/PR_EVIDENCE.md .github/REVIEW.md CONTRIBUTING.md; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f — review infrastructure incomplete"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 1 ] && exit 1
          echo "✅ Review governance: all infrastructure files present"

  ## ── Static audit — fast, no build ───────────────────────────────
  audit:
    name: Static Audit
    runs-on: macos-26
    timeout-minutes: 15
    needs: [governance]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SwiftLint
        run: brew install swiftlint

      # Pattern-based static audit (whitelist-protected)
      - name: Run static audit
        run: bash scripts/audit.swift_patterns.sh

      # Full lint report — advisory only (style errors expected)
      - name: Run SwiftLint (report)
        run: |
          set -euo pipefail
          swiftlint lint --config .swiftlint.yml 2>&1 | tee /tmp/swiftlint-full.txt || true
          ERRORS=$(grep -c 'error:' /tmp/swiftlint-full.txt || true)
          WARNINGS=$(grep -c 'warning:' /tmp/swiftlint-full.txt || true)
          echo ""
          echo "📊 SwiftLint report: $ERRORS errors, $WARNINGS warnings"

      # Crash-risk rules MUST be zero in Sources/
      - name: SwiftLint crash-risk gate (Sources/)
        run: |
          set -euo pipefail
          swiftlint lint --config .swiftlint.yml Sources/ 2>&1 \
            | tee /tmp/swiftlint-sources.txt || true
          FU=$(grep -c 'force_unwrapping.*error' /tmp/swiftlint-sources.txt || true)
          IU=$(grep -c 'implicitly_unwrapped_optional.*error' /tmp/swiftlint-sources.txt || true)
          FE=$(grep -c 'fatal_error_message.*error' /tmp/swiftlint-sources.txt || true)
          echo "🔒 force_unwrapping=$FU  implicitly_unwrapped=$IU  fatal_error_message=$FE"
          FAIL=0
          [ "$FU" -gt 0 ] && echo "❌ force_unwrapping in Sources/ — pipeline blocked" && FAIL=1
          [ "$IU" -gt 0 ] && echo "❌ implicitly_unwrapped_optional in Sources/ — pipeline blocked" && FAIL=1
          [ "$FE" -gt 0 ] && echo "❌ fatal_error_message in Sources/ — pipeline blocked" && FAIL=1
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✅ Crash-risk rules clean in Sources/"

      # Secret scanning — detect hardcoded keys, tokens, passwords in the diff
      # Source: references/zeroclaw/.githooks/pre-commit + gitleaks.toml
      - name: Setup gitleaks
        run: brew install gitleaks

      - name: Secret scanning (diff scan)
        run: |
          set -euo pipefail
          # In PR context, scan the diff between HEAD and base branch
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin +refs/heads/${GITHUB_BASE_REF}:
            gitleaks detect --source "$(git diff origin/${GITHUB_BASE_REF})" --verbose || {
              echo "❌ Secret detected in changes — pipeline blocked"
              exit 1
            }
          else
            # Fallback: scan staged content or current files
            gitleaks detect --source "." --verbose --no-git || {
              echo "❌ Secret detected — pipeline blocked"
              exit 1
            }
          fi
          echo "✅ Secret scan: clean"

      # TODO: Add test coverage baseline check once threshold is established
      # - name: Test coverage gate
      #   run: |
      #     set -euo pipefail
      #     python3 scripts/coverage_report.py --min-coverage 40 || {
      #       echo "⚠️ Coverage below 40% threshold"
      #       exit 1
      #     }

  ## ── Build + test ────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (macos-26)
    runs-on: macos-26
    timeout-minutes: 45
    needs: [audit]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SPM dependencies
        run: swift package resolve
        env:
          SWIFT_BUILD_NUM_WORKERS: 2

      # SPM cache — key on resolved deps to bust on version bump
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Setup MLX metallib
        run: |
          bash scripts/setup-metallib.sh || {
            echo "⚠️ setup-metallib.sh failed — searching system..."
            METALLIB=$(find /opt/homebrew /Library/Developer -maxdepth 8 -name 'mlx.metallib' -type f 2>/dev/null | head -1)
            if [ -n "$METALLIB" ]; then
              mkdir -p .build/arm64-apple-macosx/debug/
              mkdir -p .build/arm64-apple-macosx/release/ 2>/dev/null || true
              cp "$METALLIB" .build/arm64-apple-macosx/debug/
              cp "$METALLIB" .build/arm64-apple-macosx/release/ 2>/dev/null || true
              echo "✅ Copied from $METALLIB"
            else
              echo "⚠️ No mlx.metallib found — MLX will fall back to CPU"
            fi
          }

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          export SWIFT_BUILD_NUM_WORKERS=2
          echo "🧪 Running tests with coverage..."
          swift test --enable-code-coverage
        env:
          OCOREAI_BUILD: ci

      - name: Generate coverage report
        run: |
          set -euo pipefail
          COVERAGE_PATH=$(swift test --show-code-coverage-path 2>/dev/null \
              || echo ".build/arm64-apple-macosx/debug/codecov/ocoreai.json")
          echo "📊 Coverage data at: $COVERAGE_PATH"
          python3 scripts/coverage_report.py \
            || echo "⚠️ Coverage report failed (non-blocking)"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-data
          path: .build/*/codecov/
          retention-days: 7

      # Build both configurations — both are required gate
      - name: Build release (MLX default)
        run: |
          set -euo pipefail
          export SWIFT_BUILD_NUM_WORKERS=2
          swift build -c release
        env:
          OCOREAI_BUILD: ci

      - name: Build release (appStore trait)
        run: |
          set -euo pipefail
          export SWIFT_BUILD_NUM_WORKERS=2
          swift build -c release --traits appStore
        env:
          OCOREAI_BUILD: ci

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocoreai-binary
          path: |
            .build/arm64-apple-macosx/release/ocoreai
            .build/arm64-apple-macosx/release/mlx.metallib
          retention-days: 7

  ## ── Release (tagged pushes only) ────────────────────────────────
  release:
    name: Release
    runs-on: macos-26
    needs: [build-and-test]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ocoreai-binary
          path: .build/arm64-apple-macosx/release/

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG → Version: $VERSION"

      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          echo "📦 Verifying release prerequisites..."
          if [ ! -f ".build/arm64-apple-macosx/release/ocoreai" ]; then
            echo "❌ Release binary not found"
            exit 1
          fi
          echo "✅ Binary OK"
          if [ ! -f "PrivacyInfo.xcprivacy" ]; then
            echo "❌ PrivacyInfo.xcprivacy missing — block release"
            exit 1
          fi
          echo "✅ PrivacyInfo.xcprivacy OK"

      - name: Package macOS App
        run: |
          set -euo pipefail
          APP_DIR="ocoreai.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          cp .build/arm64-apple-macosx/release/ocoreai "$APP_DIR/MacOS/"
          cp .build/arm64-apple-macosx/release/mlx.metallib "$APP_DIR/MacOS/" \
              2>/dev/null || echo "⚠️ No metallib"
          cp PrivacyInfo.xcprivacy "$APP_DIR/Resources/"

          python3 -c "
          import xml.etree.ElementTree as ET
          version = '${{ steps.version.outputs.version }}'
          root = ET.Element('plist', version='1.0')
          d = ET.SubElement(root, 'dict')
          items = [
            ('CFBundleExecutable', 'ocoreai'),
            ('CFBundleIdentifier', 'com.uingei.ocoreai'),
            ('CFBundleName', 'ocoreai'),
            ('CFBundleShortVersionString', version),
            ('CFBundleVersion', version),
            ('LSMinimumSystemVersion', '15.0'),
            ('NSHighResolutionCapable', 'true'),
            ('LSRequiresIPhoneOS', 'false'),
            ('NSCameraUsageDescription',
             'Camera access for multimodal AI vision input.'),
            ('NSMicrophoneUsageDescription',
             'Microphone access for voice input (STT).'),
          ]
          for k, v in items:
              ET.SubElement(d, 'key').text = k
              ET.SubElement(d, 'string').text = v
          tree = ET.ElementTree(root)
          plist = '$APP_DIR/Info.plist'
          with open(plist, 'wb') as f:
              f.write(b'<?xml version=\\\"1.0\\\" encoding=\\\"UTF-8\\\"?>\\n')
              f.write(b'<!DOCTYPE plist PUBLIC \\\"-//Apple//DTD PLIST 1.0//EN\\\" '
                      b'\\\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\\\">\\n')
              tree.write(f, encoding='UTF-8', xml_declaration=False)
          "

      - name: Ad-hoc codesign
        run: |
          set -euo pipefail
          codesign --sign - --force --deep --options runtime ocoreai.app
          codesign -vvv --strict ocoreai.app
          echo "✅ Codesign verified"

      - name: Archive builds
        run: |
          set -euo pipefail
          tar czf ocoreai-macos.tar.gz ocoreai.app
          shasum -a 256 ocoreai-macos.tar.gz > SHA256.txt
          echo "📦 $(du -h ocoreai-macos.tar.gz | awk '{print $1}')"
          echo "🔖 $(cat SHA256.txt)"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ocoreai-macos.tar.gz
            SHA256.txt
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
