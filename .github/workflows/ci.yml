name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test (macos-26)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Clean & resolve dependencies
        run: |
          rm -rf .build
          swift package resolve
        env:
          SWIFT_BUILD_NUM_WORKERS: 2

      - name: Run tests
        run: |
          export SWIFT_BUILD_NUM_WORKERS=2
          # swift test — 146 tests / 34 suites (build-verified 2026-07-01)
          # If MLXLMTestUtils conflict persists on macos-26, fall back to
          # `swift build --target ocoreaiTests` as compile-integrity gate.
          swift test --traits mlx

  build-gui:
    name: Build GUI (macos-26)
    runs-on: macos-26
    timeout-minutes: 45
    needs: [test]
    steps:
      - uses: actions/checkout@v7

      - name: Cache SPM checkouts
        uses: actions/cache@v5
        with:
          path: .build/checkouts
          key: macos-spm-v7-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            macos-spm-v7-${{ hashFiles('Package.resolved') }}

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build GUI target
        run: |
          export SWIFT_BUILD_NUM_WORKERS=2
          swift build -c release --traits mlx

  release:
    name: Release
    runs-on: macos-26
    needs: [test, build-gui]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache SPM checkouts
        uses: actions/cache@v5
        with:
          path: .build/checkouts
          key: macos-spm-v7-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            macos-spm-v7-${{ hashFiles('Package.resolved') }}

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build & Package macOS App
        run: |
          export SWIFT_BUILD_NUM_WORKERS=2
          swift build -c release --traits mlx
          APP_DIR=".build/release/ocoreai.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp .build/release/ocoreai "$APP_DIR/Contents/MacOS/"
          python3 -c "
          import xml.etree.ElementTree as ET
          from xml.dom import minidom
          root = ET.Element('plist', version='1.0')
          d = ET.SubElement(root, 'dict')
          items = [
            ('CFBundleExecutable', 'ocoreai'),
            ('CFBundleIdentifier', 'com.uingei.ocoreai'),
            ('CFBundleName', 'ocoreai'),
            ('CFBundleShortVersionString', '1.0'),
            ('CFBundleVersion', '1'),
            ('LSMinimumSystemVersion', '15.0'),
            ('NSHighResolutionCapable', 'true'),
          ]
          for k, v in items:
              ET.SubElement(d, 'key').text = k
              ET.SubElement(d, 'string').text = v
          tree = ET.ElementTree(root)
          with open(f'$APP_DIR/Contents/Info.plist', 'wb') as f:
              f.write(b'''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          ''')
              tree.write(f, encoding='UTF-8', xml_declaration=False)
          "
          cp PrivacyInfo.xcprivacy "$APP_DIR/Contents/Resources/" 2>/dev/null || true
        env:
          OCOREAI_BUILD: ci

      - name: Archive builds
        run: |
          cd .build/release
          tar czf ocoreai-macos-gui.tar.gz ocoreai
          tar czf ocoreai-macos-app.tar.gz ocoreai.app
          shasum -a 256 ocoreai-macos-gui.tar.gz ocoreai-macos-app.tar.gz > SHA256.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/release/ocoreai-macos-gui.tar.gz
            .build/release/ocoreai-macos-app.tar.gz
            .build/release/SHA256.txt
          prerelease: true
