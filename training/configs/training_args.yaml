model:
  name_or_path: "Qwen/Qwen2.5-3B"
  torch_dtype: "bfloat16"
  use_cache: false
  attn_implementation: "sdpa"
  # Qwen2.5-3B architecture config
  model_config:
    vocab_size: 152064
    hidden_size: 2560
    intermediate_size: 6912
    num_hidden_layers: 36
    num_attention_heads: 32
    num_key_value_heads: 4
    max_position_embeddings: 32768
    rms_norm_eps: 1.0e-6
    rope_theta: 1000000.0
    use_sliding_window: false

data:
  dataset_paths:
    - "/data/code_dataset.parquet"
    - "/data/tools_dataset.parquet"
    - "/data/commonsense_dataset.parquet"
  dataset_ratios:
    code: 0.55
    tools: 0.25
    commonsense: 0.20
  streaming: true
  prefetch_factor: 4
  num_workers: 8
  max_seq_length: 32768
  truncation: true

training:
  output_dir: "./checkpoints"
  logging_dir: "./logs"
  run_name: "qwen2.5-3b-pretrain-deepspeed"
  max_steps: 60000
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.10
  bf16: true
  fp16: false
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  deepspeed: "configs/deepspeed_z3.json"
  seed: 42

checkpointing:
  save_steps: 500
  save_total_limit: 3
  save_strategy: "steps"
  load_best_model_at_end: false

logging:
  logging_steps: 10
  logging_strategy: "steps"
  report_to:
    - "wandb"
    - "tensorboard"
  wandb:
    project: "qwen2.5-3b-pretrain"
    entity: ""
    log_code: false

evaluation:
  eval_strategy: "steps"
  eval_steps: 5000
  harnesses:
    - "humaneval"
    - "mbpp"
  eval_generations:
    temperature: 0.2
    top_p: 0.95
    max_new_tokens: 512
    do_sample: false
    num_beam_search: 5

loss_spike_detection:
  enabled: true
  window_size: 5
  threshold_factor: 3.0
  rollback_enabled: true
  rollback_checkpoint_dir: "./checkpoints"
