# ocoreai SwiftLint Configuration
# SwiftLint 0.65.0, Swift 6.3
# Strategy: bug-catching lint, not style enforcement.
# Style is handled by the codebase's own conventions.

excluded:
  - .build
  - references

# Only opt-in rules that catch real problems
opt_in_rules:
  - blanket_disable_command
  - closure_spacing
  - convenience_type
  - discarded_notification_center_observer
  - discouraged_optional_boolean
  - empty_count
  - empty_xctest_method
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - legacy_random
  - number_separator
  - overridden_super_call
  - private_action
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - self_binding
  - strict_fileprivate
  - superfluous_else
  - toggle_bool
  - unowned_variable_capture
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_declaration

# Severity: force unwrap is a warning in tests, error in Sources
# (handled via .swiftlint.yml region exclusions or by keeping as warning)
force_unwrapping:
  severity: warning
implicitly_unwrapped_optional:
  severity: warning
force_cast:
  severity: warning

# Architecture thresholds — function_parameter_count, body_length, cyclomatic_complexity
# are structural, not bugs. Warning only.
function_parameter_count:
  warning: 5
  error: 20
cyclomatic_complexity:
  warning: 10
  error: 50

# Reasonable thresholds (lenient to not block existing code)
type_body_length:
  warning: 700
  error: 1200
function_body_length:
  warning: 80
  error: 800
file_length:
  warning: 1000
  error: 1500
line_length:
  warning: 180
  error: 250
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true
large_tuple:
  warning: 4
  error: 6
identifier_name:
  min_length: 1
  exclude:
    - "Tests/**"
  excluded:
    - "id"
    - "i"
    - "j"
    - "k"
    - "_"
    - "ex"
    - "err"
    - "to"
    - "db"
    - "at"
    # SQLite C API constants
    - "SQLITE_OK"
    - "SQLITE_ROW"
    - "SQLITE_DONE"
    - "SQLITE_NULL"
    - "SQLITE_INTEGER"
    - "SQLITE_FLOAT"
    - "SQLITE_BLOB"
    - "SQLITE_TEXT"
    - "SQLITE_TRANSIENT"
    - "SQLITE_OPEN_CREATE"
    - "SQLITE_OPEN_READWRITE"
    - "SQLITE_OPEN_FULLMUTEX"
    # Internal underscore-prefixed functions (logging macros, test helpers)
    - "_trace"
    - "_debug"
    - "_info"
    - "_warning"
    - "_error"
    - "_critical"
    - "_convJSON"
    - "_convJSONDict"
    - "_warnContext"
    - "_errorContext"
    - "session_id"
    - "_token"
nesting:
  type_level: 4
  function_level: 4
trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

# Disable rules that fight existing conventions (tab indent, MARKs, etc.)
disabled_rules:
  - trailing_comma
  - vertical_whitespace
  - void_return
  - multiple_closures_with_trailing_closure
